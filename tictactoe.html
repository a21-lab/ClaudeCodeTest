<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.6rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #scoreboard {
      display: flex;
      gap: 2rem;
      margin-top: 1.8rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 0.6rem 1.4rem;
    }

    .score-box .label { color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    .score-box .value { font-size: 1.6rem; font-weight: bold; }
    .score-box.x .value { color: #e94560; }
    .score-box.o .value { color: #a8dadc; }
    .score-box.draw .value { color: #f4a261; }

    #reset-btn {
      margin-top: 1.8rem;
      padding: 0.7rem 2.2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    #reset-btn:hover { background: #c73652; transform: scale(1.04); }

    #mode-toggle {
      margin-bottom: 1rem;
      display: flex;
      gap: 0;
      border: 2px solid #0f3460;
      border-radius: 8px;
      overflow: hidden;
    }

    .mode-btn {
      padding: 0.5rem 1.2rem;
      background: #16213e;
      color: #888;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s, color 0.2s;
    }

    .mode-btn.active {
      background: #0f3460;
      color: #eee;
    }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>

  <div id="mode-toggle">
    <button class="mode-btn active" data-mode="pvp">2 Players</button>
    <button class="mode-btn" data-mode="pvc">vs Computer</button>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="scoreboard">
    <div class="score-box x">
      <div class="label">X Wins</div>
      <div class="value" id="score-x">0</div>
    </div>
    <div class="score-box draw">
      <div class="label">Draws</div>
      <div class="value" id="score-draw">0</div>
    </div>
    <div class="score-box o">
      <div class="label">O Wins</div>
      <div class="value" id="score-o">0</div>
    </div>
  </div>

  <button id="reset-btn">New Game</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, gameOver, mode;
    let scores = { X: 0, O: 0, D: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const scoreX = document.getElementById('score-x');
    const scoreO = document.getElementById('score-o');
    const scoreDraw = document.getElementById('score-draw');

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      status.textContent = "X's turn";
    }

    function checkWin(b, p) {
      return WINS.find(line => line.every(i => b[i] === p)) || null;
    }

    function checkDraw(b) {
      return b.every(v => v !== '');
    }

    function applyMove(idx, player) {
      board[idx] = player;
      const cell = cells[idx];
      cell.textContent = player;
      cell.classList.add('taken', player.toLowerCase());

      const winLine = checkWin(board, player);
      if (winLine) {
        winLine.forEach(i => cells[i].classList.add('win'));
        status.textContent = `${player} wins!`;
        scores[player]++;
        updateScores();
        gameOver = true;
        return;
      }
      if (checkDraw(board)) {
        status.textContent = "It's a draw!";
        scores.D++;
        updateScores();
        gameOver = true;
        return;
      }
      current = player === 'X' ? 'O' : 'X';
      status.textContent = `${current}'s turn`;
    }

    function updateScores() {
      scoreX.textContent = scores.X;
      scoreO.textContent = scores.O;
      scoreDraw.textContent = scores.D;
    }

    // Minimax AI
    function minimax(b, isMax) {
      if (checkWin(b, 'O')) return 10;
      if (checkWin(b, 'X')) return -10;
      if (b.every(v => v !== '')) return 0;

      if (isMax) {
        let best = -Infinity;
        b.forEach((v, i) => {
          if (!v) {
            b[i] = 'O';
            best = Math.max(best, minimax(b, false));
            b[i] = '';
          }
        });
        return best;
      } else {
        let best = Infinity;
        b.forEach((v, i) => {
          if (!v) {
            b[i] = 'X';
            best = Math.min(best, minimax(b, true));
            b[i] = '';
          }
        });
        return best;
      }
    }

    function bestMove() {
      let best = -Infinity, move = -1;
      board.forEach((v, i) => {
        if (!v) {
          board[i] = 'O';
          const score = minimax(board, false);
          board[i] = '';
          if (score > best) { best = score; move = i; }
        }
      });
      return move;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (gameOver || board[i]) return;
        if (mode === 'pvc' && current === 'O') return;

        applyMove(i, current);

        if (!gameOver && mode === 'pvc') {
          setTimeout(() => {
            if (!gameOver) applyMove(bestMove(), 'O');
          }, 250);
        }
      });
    });

    document.getElementById('reset-btn').addEventListener('click', init);

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mode = btn.dataset.mode;
        init();
      });
    });

    mode = 'pvp';
    init();
  </script>
</body>
</html>
